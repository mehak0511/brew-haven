<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
     <link rel="stylesheet" href="css/contact.css">

    <title>Contact</title>
</head>
<body>
    <main>
        <section class="contact-hero">
            <h1>Get In Touch</h1>
            <p>
                 We'd love to hear from you. Whether you have a question,
            feedback, or simply want to say hello, we're here to help.
            </p>
        </section>

        <section class="contact-info">
             <section class="contact-info">

        <div class="info-card">
            <h3>📍 Visit Us</h3>
            <p>123 Coffee Street, Downtown</p>
        </div>

        <div class="info-card">
            <h3>📞 Call Us</h3>
            <p>+91 98765 43210</p>
        </div>

        <div class="info-card">
            <h3>✉ Email</h3>
            <p>hello@brewhaven.com</p>
            </div>

        <div class="info-card">
            <h3>🕒 Opening Hours</h3>
            <p>Mon - Sun<br>8:00 AM – 10:00 PM</p>
        </div>
 <section class="contact-form">

        <h2>Send us a Message</h2>

        <form>

            <input
                type="text"
                placeholder="Your Name"
                required
            >

            <input
                type="email"
                placeholder="Email Address"
                required
            >

            <textarea
                rows="6"
                placeholder="Your Message"
                required
            ></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

    </section>
    </main>
    
</body>
</html>
